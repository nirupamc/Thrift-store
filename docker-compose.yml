version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: thrift_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: thrift_user
      POSTGRES_PASSWORD: thrift_pass
      POSTGRES_DB: thrift_bazaar
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U thrift_user -d thrift_bazaar']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: thrift_redis
    restart: unless-stopped
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: thrift_app
    restart: unless-stopped
    env_file: .env
    ports:
      - '${PORT:-5000}:5000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs

volumes:
  postgres_data:
  redis_data:
